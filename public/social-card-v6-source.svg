<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060E0A"/>
      <stop offset="0.5" stop-color="#091410"/>
      <stop offset="1" stop-color="#0C1915"/>
    </linearGradient>
    <radialGradient id="glowTopLeft" cx="180" cy="100" r="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4" stop-opacity="0.12"/>
      <stop offset="0.6" stop-color="#5EEAD4" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTopRight" cx="1020" cy="80" r="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity="0.08"/>
      <stop offset="0.7" stop-color="#67E8F9" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="600" cy="590" r="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardStroke" x1="70" y1="50" x2="1130" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A32" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#2A4F44" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#1E3A32" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pillStroke" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D4A40"/>
      <stop offset="1" stop-color="#1A2E27"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="70" y="50" width="1060" height="500" rx="24"/>
    </clipPath>
    <filter id="pillGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060E0A"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowTopLeft)"/>
  <rect width="1200" height="630" fill="url(#glowTopRight)"/>
  <rect width="1200" height="630" fill="url(#glowBottom)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.025" stroke="#5EEAD4" stroke-width="0.4">
    <line x1="0" y1="168" x2="1200" y2="168"/>
    <line x1="0" y1="336" x2="1200" y2="336"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Card body (clipped for overflow) -->
  <g clip-path="url(#cardClip)">
    <rect x="70" y="50" width="1060" height="500" rx="24" fill="#0A1410"/>
    <rect x="70" y="50" width="1060" height="500" rx="24" fill="url(#cardStroke)" fill-opacity="0.15"/>
  </g>
  <!-- Card border -->
  <rect x="70" y="50" width="1060" height="500" rx="24" fill="none" stroke="url(#cardStroke)" stroke-width="1.5"/>

  <!-- Brand dot + name -->
  <circle cx="130" cy="115" r="8" fill="#5EEAD4" opacity="0.9"/>
  <text x="152" y="121" fill="#5EEAD4" font-family="'SF Pro Display', 'Inter', Arial, Helvetica, sans-serif" font-size="26" font-weight="600" letter-spacing="0.5">ContextKit</text>

  <!-- Headline -->
  <text x="116" y="228" fill="#F0FDF9" font-family="'SF Pro Display', 'Inter', Arial, Helvetica, sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5">
    <tspan x="116" dy="0">Memory Layer</tspan>
  </text>
  <text x="116" y="308" fill="#F0FDF9" font-family="'SF Pro Display', 'Inter', Arial, Helvetica, sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5">
    <tspan x="116" dy="0">for AI Agents</tspan>
  </text>

  <!-- Accent line under headline -->
  <line x1="116" y1="330" x2="280" y2="330" stroke="#5EEAD4" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Description -->
  <text x="116" y="380" fill="#8BA8A0" font-family="'SF Pro Text', 'Inter', Arial, Helvetica, sans-serif" font-size="26" font-weight="400" letter-spacing="0.2">
    <tspan x="116" dy="0">x402-paid context compression, handoffs, profile memory,</tspan>
    <tspan x="116" dy="38">API credits, and TypeScript SDK for autonomous workflows.</tspan>
  </text>

  <!-- Feature pills — inside the card -->
  <g filter="url(#softShadow)">
    <!-- summarize pill -->
    <rect x="116" y="477" width="164" height="48" rx="24" fill="#111D19" stroke="#2D4A40" stroke-width="1.2"/>
    <text x="198" y="508" fill="#D1FAE5" font-family="'SF Pro Text', 'Inter', Arial, Helvetica, sans-serif" font-size="21" font-weight="500" text-anchor="middle" letter-spacing="0.3">summarize</text>

    <!-- compress pill -->
    <rect x="296" y="477" width="152" height="48" rx="24" fill="#111D19" stroke="#2D4A40" stroke-width="1.2"/>
    <text x="372" y="508" fill="#D1FAE5" font-family="'SF Pro Text', 'Inter', Arial, Helvetica, sans-serif" font-size="21" font-weight="500" text-anchor="middle" letter-spacing="0.3">compress</text>

    <!-- handoff pill -->
    <rect x="464" y="477" width="140" height="48" rx="24" fill="#111D19" stroke="#2D4A40" stroke-width="1.2"/>
    <text x="534" y="508" fill="#D1FAE5" font-family="'SF Pro Text', 'Inter', Arial, Helvetica, sans-serif" font-size="21" font-weight="500" text-anchor="middle" letter-spacing="0.3">handoff</text>

    <!-- profile pill -->
    <rect x="620" y="477" width="128" height="48" rx="24" fill="#111D19" stroke="#2D4A40" stroke-width="1.2"/>
    <text x="684" y="508" fill="#D1FAE5" font-family="'SF Pro Text', 'Inter', Arial, Helvetica, sans-serif" font-size="21" font-weight="500" text-anchor="middle" letter-spacing="0.3">profile</text>
  </g>

  <!-- URL -->
  <text x="1084" y="509" fill="#5A7A70" font-family="'SF Pro Text', 'Inter', Arial, Helvetica, sans-serif" font-size="22" font-weight="400" text-anchor="end" letter-spacing="0.5">contextkit.pro</text>
</svg>
